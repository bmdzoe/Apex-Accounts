<!-- approveReject.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Approve / Reject Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">
  <div>
    <span>Username: AdminUser</span>
    <a href="profile.html">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
	<a href="login.html">Logout</a>
  </div>
</header>

<main>
  <h1>Approve / Reject Request</h1>

  <form id="approveRejectForm">
    <label>User ID</label><br>
    <input type="text" id="displayUid" disabled><br><br>

    <label>First Name</label><br>
    <input type="text" id="displayFirst" disabled><br><br>

    <label>Last Name</label><br>
    <input type="text" id="displayLast" disabled><br><br>

    <label>Email Address</label><br>
    <input type="email" id="displayEmail" disabled><br><br>

    <label for="decision">Decision</label><br>
    <select id="decision" required>
      <option value="">Select</option>
      <option value="approve">Approve</option>
      <option value="reject">Reject</option>
    </select><br><br>

    <label for="message">Email Message</label><br>
    <textarea id="message" name="message" rows="6" required></textarea><br><br>

    <label for="loginlink">Login Link (if approved)</label><br>
    <input type="url" id="loginlink" name="loginlink" value="login.html"><br><br>

    <button type="submit">Submit</button>
    <a href="accessRequests.html">Cancel</a>

  </form>
</main>

<script type="module">
  import { db } from './firebase-config.js';
  import { doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const urlParams = new URLSearchParams(window.location.search);
  const userToReview = urlParams.get('uid');

  // loading user data from database
  if (userToReview) {
    const userRef = doc(db, "users", userToReview);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {
      const data = userSnap.data();
      document.getElementById('displayUid').value = userToReview;
      document.getElementById('displayFirst').value = data.firstName;
      document.getElementById('displayLast').value = data.lastName;
      document.getElementById('displayEmail').value = data.email;
    }
  }

  // approving or denial
  document.getElementById('approveRejectForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const decision = document.getElementById('decision').value;
    const userRef = doc(db, "users", userToReview);

    try {
      if (decision === 'approve') {
   await updateDoc(userRef, { 
      approved: true, 
      status: 'approved' 
    });
    alert("User approved! They can now log in.");
      } else {
      
        await updateDoc(userRef, { 
          approved: false, 
          status: 'rejected' 
        });
        alert("User rejected. Their account is now locked with a 'Rejected' status.");
      } 

     
      window.location.href = "accessRequests.html";

    } catch (error) {
      alert("Error: " + error.message);
    }
  });
</script>

</body>
</html>
