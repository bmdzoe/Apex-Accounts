<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo">
  <div>
    <span>Username: UserName</span>
    <img src="assets/userAdmin.png" alt="User Picture" width="40" height="40">
  </div>
</header>

<main>
  <h1>User Profile</h1>

  <form action="#" method="post">

    <label>User ID</label><br>
    <input type="text" value="U1001" disabled><br><br>

    <label>First Name</label><br>
    <input type="text" value="Jane"><br><br>

    <label>Last Name</label><br>
    <input type="text" value="Doe"><br><br>

    <label>Email Address</label><br>
    <input type="email" value="jane@example.com"><br><br>

    <label>Address</label><br>
    <input type="text" value="123 Main St"><br><br>

    <label>Date of Birth</label><br>
    <input type="date" value="2000-01-01"><br><br>

    <button type="submit">Save Changes</button>
    <a href="accountantDashboard.html">Cancel</a>

  </form>
</main>

</body>
</html>
