<!-- activateDeactivateUser.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activate/Deactivate User</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo">
  <div>
    <span>Username: AdminUser</span>
    <a href="profile.html">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
	<a href="login.html">Logout</a>
  </div>
</header>

<main>
  <h1>Activate/Deactivate User</h1>

  <form action="activateDeactivateConfirmation.html" method="get">
    <label for="userid">User ID</label><br>
    <input type="text" id="userid" name="userid" required><br><br>

    <label for="status">Set Status</label><br>
    <select id="status" name="status" required>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select><br><br>

    <button type="submit">Save</button>
    <a href="adminDashboard.html">Cancel</a>
  </form>
</main>

<script type="module">
  import { db } from './firebase-config.js';
  import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const statusForm = document.querySelector('form');

  statusForm.addEventListener('submit', async (e) => {
    e.preventDefault(); 
    
    const uid = document.getElementById('userid').value.trim();
    const newStatus = document.getElementById('status').value;
    const userRef = doc(db, "users", uid);

    try {
  const userSnap = await getDoc(userRef);
  
  if (!userSnap.exists()) {
    alert("Error: User ID not found in database.");
    return;
  }


  const selection = document.getElementById('status').value; // active or inactive
  const finalStatus = (selection === 'active') ? 'approved' : 'suspended';
  const finalApproved = (selection === 'active');

 
  await updateDoc(userRef, {
    status: finalStatus,
    approved: finalApproved
  });

  alert(`User status successfully updated to: ${finalStatus.toUpperCase()}`);
  window.location.href = "activateDeactivateConfirmation.html"; 
  
} catch (error) {
  alert("Failed to update user: " + error.message);
}
  });
</script>

</body>

</html>
