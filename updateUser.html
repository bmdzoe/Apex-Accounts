<!-- updateUser.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Update User</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script>
    function openCalendar() {
      window.open(
        "calendar.html",
        "CalendarPopup",
        "width=500,height=550,left=100,top=100,resizable=yes,scrollbars=no"
      );
    }

    function openHelp() {
      window.open(
        "help.html",
        "HelpPopup",
        "width=700,height=600,left=120,top=80,resizable=yes,scrollbars=yes"
      );
    }
  </script>
</head>
<body>

<header class="header-bar">
  <img src="assets/logo.png" alt="Logo" width="120" title="Apex Accounts logo">

  <div class="top-services">
    <span onclick="openCalendar()" title="Open the calendar popup">Calendar</span>
    <span onclick="window.location.href='chartOfAccounts.html'" title="Open the Chart of Accounts module">Chart of Accounts</span>
    <span onclick="window.location.href='journaling.html'" title="Open the Journalizing module">Journaling</span>
    <span onclick="window.location.href='ledger.html'" title="Open the Ledger module">Ledger</span>
    <span onclick="openHelp()" title="Open help information for the software">Help</span>
  </div>

  <div class="user-area">
    <span>Username: AdminUser</span>
    <a href="profile.html" title="Open your user profile">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
    <a href="login.html" title="Log out of the system">Logout</a>
  </div>
</header>

<main>
  <h1>Update User</h1>

  <form id="updateUserForm" action="#" method="post">
    <label for="userid">User ID</label><br>
    <input type="text" id="userid" name="userid" required title="Enter the user ID for the account you want to update"><br><br>

    <label for="firstname">First Name</label><br>
    <input type="text" id="firstname" name="firstname" title="Enter a new first name or leave blank for no change"><br><br>

    <label for="lastname">Last Name</label><br>
    <input type="text" id="lastname" name="lastname" title="Enter a new last name or leave blank for no change"><br><br>

    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" title="Enter a new email address or leave blank for no change"><br><br>

    <label for="role">Role</label><br>
    <select id="role" name="role" title="Select a new role for the user or choose no change">
      <option value="">No change</option>
      <option value="administrator">Administrator</option>
      <option value="manager">Manager</option>
      <option value="accountant">Accountant</option>
    </select><br><br>

    <button type="submit" title="Save the updated user information">Update User</button>
    <a href="adminDashboard.html" title="Cancel and return to the administrator dashboard">Cancel</a>
  </form>
</main>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  document.getElementById('updateUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const id = document.getElementById('userid').value.trim();
    const first = document.getElementById('firstname').value.trim();
    const last = document.getElementById('lastname').value.trim();
    const email = document.getElementById('email').value.trim();
    const role = document.getElementById('role').value;
  
    try {
      const userRef  = doc(db, "users", id);
      const userSnap = await getDoc(userRef);
  
      if(!userSnap.empty){
        await updateDoc(userRef, {
          firstName:    first,
          lastName:     last,
          email:        email,
          role:         role,
        });
        alert("User has been successfully updated!");
      } else {
        alert("This user does not exist. Try again");
      }
    } catch (err) {
      alert("Update failed: " + err.message);
    }
  });
</script>

</body>
</html>
