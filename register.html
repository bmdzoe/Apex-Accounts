<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Application - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="login-card">
        <div class="logo-area">
            <img src="assets/logo.png" alt="Logo" width="120">
            <div class="logo-name">Apex Accounts</div>
        </div>
        <div class="login-header">
            <h2>Create Account</h2>
            <p>Fill in the details to create your account</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Enter a username" autocomplete="username" required>
            </div>
            
            <div class="form-row" style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>First Name</label>
                    <input type="text" id="first" placeholder="Jane" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Last Name</label>
                    <input type="text" id="last" placeholder="Smith" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="jane@company.com" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+1 555 000 0000" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea id="address" placeholder="Street address, City, State, ZIP" style="min-height:70px" required></textarea>
            </div>

            <div class="form-group">
                <label>Security Question</label>
                <select id="secQ" required>
                    <option value="">Select a question</option>
                    <option value="maiden">What is your mother's maiden name?</option>
                    <option value="pet">What was the name of your first pet?</option>
                    <option value="city">What city were you born in?</option>
                    <option value="school">What is the name of your elementary school?</option>
                </select>
            </div>

            <div class="form-group">
                <label>Security Answer</label>
                <input type="text" id="secA" placeholder="Your answer" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="regPw" placeholder="Create a password" minlength="8" required>
                </div>
            </div>

            <button type="submit" class="auth-button" style="margin-top: 20px; width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Submit</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="login.html" style="color: #666; text-decoration: none;">Cancel</a>
            </p>
        </form>
    </div>


<script type="module">
  import { auth, db } from './firebase-config.js';
  import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const registerForm = document.getElementById('registerForm'); //form id, this is JS

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('regPw').value;

   try {
 
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // saving profile data to database
      await setDoc(doc(db, "users", user.uid), {
        username: document.getElementById('regUsername').value,
        firstName: document.getElementById('first').value,
        lastName: document.getElementById('last').value,
        email: document.getElementById('email').value,
        dob: document.getElementById('dob').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        securityQuestion: document.getElementById('secQ').value,
        securityAnswer: document.getElementById('secA').value,
        approved: false, //admin approval
        status: "pending",
        loginAttempts: 0, 
        role: "accountant" // hardcoding role for now
    

      });
        
        window.location.href = "pendingApproval.html";
      }
      catch(error) {
        alert("Registration Failed: " + error.message);
      }
  });
</script>

</body>
</html>
