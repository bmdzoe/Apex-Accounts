<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">
</header>

<main>
  <h1>Create Account</h1>
  <form id="registerForm"> <!-- Firebase is looking for form IDs -->
    <label for="regUsername">Username</label><br>
    <input type="text" id="regUsername" name="regUsername" autocomplete="username" required><br><br>

    <label for="first">First Name</label><br>
    <input type="text" id="first" name="first" required><br><br>

    <label for="last">Last Name</label><br>
    <input type="text" id="last" name="last" required><br><br>

    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="dob">Date of Birth</label><br>
    <input type="date" id="dob" name="dob" required><br><br>

    <label for="phone">Phone Number</label><br>
    <input type="tel" id="phone" name="phone" required><br><br>

    <label for="address">Address</label><br>
    <textarea id="address" name="address" rows="3" required></textarea><br><br>

    <label for="secQ">Security Question</label><br>
    <select id="secQ" name="secQ" required>
      <option value="">Select a question</option>
      <option value="maiden">What is your mother's maiden name?</option>
      <option value="pet">What was the name of your first pet?</option>
      <option value="city">What city were you born in?</option>
      <option value="school">What is the name of your elementary school?</option>
    </select><br><br>

    <label for="secA">Security Answer</label><br>
    <input type="text" id="secA" name="secA" required><br><br>

    <label for="regPw">Password</label><br>
    <input type="password" id="regPw" name="regPw" minlength="8" required><br><br>

    <button type="submit">Submit</button>
    <a href="login.html">Cancel</a>
  </form>
</main>


<script type="module">
  import { auth, db } from './firebase-config.js';
  import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const registerForm = document.getElementById('registerForm'); //form id, this is JS

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('regPw').value;

   try {
 
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // saving profile data to database
      await setDoc(doc(db, "users", user.uid), {
        username: document.getElementById('regUsername').value,
        firstName: document.getElementById('first').value,
        lastName: document.getElementById('last').value,
        dob: document.getElementById('dob').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        securityQuestion: document.getElementById('secQ').value,
        securityAnswer: document.getElementById('secA').value,
        role: "accountant" // hardcoding role for now
      });
        
        window.location.href = "pendingApproval.html";
      }
      catch(error) {
        alert("Registration Failed: " + error.message);
      }
  });
</script>

</body>
</html>
