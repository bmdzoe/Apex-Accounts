<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">
</header>

<main>
  <h1>Reset Password</h1>

  <p>
    Password must be at least 8 characters, start with a letter, and include a letter,
    a number, and a special character. Password used in the past cannot be used.
  </p>

  <form id="resetForm">

    <label for="newpass">New Password</label><br>
    <input
      type="password"
      id="newpass"
      name="newpass"
      minlength="8"
      pattern="^(?=[A-Za-z])(?=.*[A-Za-z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}$"
      title="Password must start with a letter, include a letter, a number, and a special character, minimum 8 characters."
      required
    ><br><br>

    <label for="confpass">Confirm New Password</label><br>
    <input type="password" id="confpass" name="confpass" required><br><br>

    <div id="pwError" style="display:none;color:red;margin-bottom:10px;"></div>

    <button type="submit">Update Password</button>
    <a href="login.html">Cancel</a>

  </form>
</main>

<script>
const form = document.getElementById("resetForm");
const error = document.getElementById("pwError");

function passwordRuleError(pw){
  if(pw.length < 8) return "Password must be at least 8 characters.";
  if(!/^[A-Za-z]/.test(pw)) return "Password must start with a letter.";
  if(!/[A-Za-z]/.test(pw)) return "Password must include a letter.";
  if(!/[0-9]/.test(pw)) return "Password must include a number.";
  if(!/[^A-Za-z0-9]/.test(pw)) return "Password must include a special character.";
  return "";
}

form.addEventListener("submit", function(e){

  const pw = document.getElementById("newpass").value;
  const conf = document.getElementById("confpass").value;

  const ruleError = passwordRuleError(pw);

  if(ruleError){
    e.preventDefault();
    error.textContent = ruleError;
    error.style.display = "block";
    return;
  }

  if(pw !== conf){
    e.preventDefault();
    error.textContent = "Passwords do not match.";
    error.style.display = "block";
    return;
  }

});
</script>

</body>
</html>
