<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accountant Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    function openCalendar() {
      window.open(
        "calendar.html",
        "CalendarPopup",
        "width=500,height=550,left=100,top=100,resizable=yes,scrollbars=no"
      );
    }
    function openHelp() {
      window.open(
        "help.html",
        "HelpPopup",
        "width=700,height=600,left=120,top=80,resizable=yes,scrollbars=yes"
      );
    }
  </script>
</head>
<body>
<header class="header-bar">
  <img src="assets/logo.png" alt="Logo" width="120" title="Apex Accounts logo">
  <div class="top-services">
    <span onclick="openCalendar()" title="Open the calendar popup">Calendar</span>
    <span onclick="window.location.href='chartOfAccounts.html'" title="Open the Chart of Accounts module">Chart of Accounts</span>
    <span onclick="window.location.href='journaling.html'" title="Open the Journaling module">Journaling</span>
    <span onclick="openHelp()" title="Open help information for the software">Help</span>
  </div>
  <div class="user-area">
    <span id="displayUsername">Username: </span>
    <a href="profile.html" title="Open your user profile">
      <img src="assets/userAccountant.png" alt="User Profile" width="40" height="40">
    </a>
    <a href="login.html" title="Log out of the system">Logout</a>
  </div>
</header>
<main>
  <h1>Accountant Dashboard</h1>
  <nav>
    <ul>
      <li><a href="chartOfAccounts.html" title="View the chart of accounts">View Chart of Accounts</a></li>
      <li><a href="journaling.html" title="Create and view journal entries">Journaling</a></li>
      <li><a href="viewUsersReport.html" title="View reports available to manager">View Reports</a></li>
      <li><a href="expiredPasswordsReport.html" title="View users with expired passwords">Expired Passwords Report</a></li>
      <li><a href="sendEmail.html" title="Send an email from within the system">Send Email</a></li>
    </ul>
  </nav>
</main>
<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const docRef = doc(db, "users", user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const userData = docSnap.data();
        document.getElementById('displayUsername').innerText = `Username: ${userData.username}`;
      } else {
        console.log("No user");
      }
    } else {
      window.location.href = "login.html";
    }
  });
</script>
</body>
</html>
