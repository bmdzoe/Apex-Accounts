<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administrator Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">

  <div>
    <span>Username: AdminUser</span>
    <a href="profile.html">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
	<a href="login.html">Logout</a>
  </div>
</header>

<main>
  <h1>Administrator Dashboard</h1>
<div style="margin: 30px 0; display: flex; gap: 50px;">
<div>
  <h3>Total Users</h3>
  <p id="totalUsers">0</p>
  </div>

  <div>
    <h3>Pending Users</h3>
    <p id="pendingUsers">0</p>
  </div>

  <div>
    <h3>Approved Users</h3>
    <p id="approvedUsers">0</p>
  </div>
</div>
  <nav>
    <ul>
      <li><a href="createUser.html">Create User</a></li>
      <li><a href="updateUser.html">Update User</a></li>
      <li><a href="activateDeactivateUser.html">Activate/Deactivate User</a></li>
      <li><a href="viewUsersReport.html">View All Users Report</a></li>
      <li><a href="suspendUser.html">Suspend User</a></li>
      <li><a href="expiredPasswordsReport.html">Expired Passwords Report</a></li>
      <li><a href="sendEmail.html">Send Email</a></li>
<li><a href="accessRequests.html">Pending Approvals (Approve/Reject)</a></li>
    </ul>
  </nav>
</main>
<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const totalUsersEl = document.getElementById("totalUsers");
const pendingUsersEl = document.getElementById("pendingUsers");
const approvedUsersEl = document.getElementById("approvedUsers");

async function loadDashboardData() {
  const usersRef = collection(db, "users");

  const allUsersSnapshot = await getDocs(usersRef);
  totalUsersEl.textContent = allUsersSnapshot.size;

  const pendingQuery = query(usersRef, where("approved", "==", false));
  const pendingSnapshot = await getDocs(pendingQuery);
  pendingUsersEl.textContent = pendingSnapshot.size;
  const approvedQuery = query(usersRef, where("approved", "==", true));
  const approvedSnapshot = await getDocs(approvedQuery);
  approvedUsersEl.textContent = approvedSnapshot.size;
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    loadDashboardData();
  }
});

</script>
</body>

</html>
