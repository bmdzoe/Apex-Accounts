<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120" title="Apex Accounts logo">
</header>

<main>
  <h1>Forgot Password</h1>
<p>Enter your email address and username to verify your identity.</p>

<form id="forgotPasswordForm">
    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" required title="Enter the email address associated with your account"><br><br>

    <label for="username">Username</label><br>
    <input type="text" id="username" name="username" required title="Enter your username"><br><br>

    <button type="submit" title="Continue to the security questions page">Next</button>
    <a href="login.html" title="Cancel password recovery and return to the login page">Cancel</a>
</form>
</main>

<script type="module">
  import { auth, db } from './firebase-config.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const reset = document.getElementById("forgotPasswordForm");

  reset.addEventListener('submit', async(e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
     const username = document.getElementById("username").value.trim();

   try {
      const q = query(collection(db, "users"), where("username", "==", username));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        alert("No account found with that username.");
        return;
      }

      const userDoc = snapshot.docs[0];
      const userData = userDoc.data();

      if (userData.email === email) {
        sessionStorage.setItem("resetEmail", email);
        sessionStorage.setItem("resetId", userDoc.id);
        window.location.href = "securityQuestions.html";
      } else {
        alert("This email does not match the username given.");
      }
    } catch (error) {
      alert("An error occurred: " + error);
    }
  });
</script>

</body>
</html>
