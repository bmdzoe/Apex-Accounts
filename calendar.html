<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #f5f5f5;
      font-family: 'DM Sans', sans-serif;
    }

    .calendar-box {
      max-width: 420px;
      margin: 0 auto;
      background: #1b1b1b;
      border: 1px solid #c8a96b;
      border-radius: 12px;
      padding: 20px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .calendar-header h2 {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: #c8a96b;
    }

    .calendar-header button {
      background: #c8a96b;
      color: #111;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: 600;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      text-align: center;
    }

    .day-name {
      font-weight: 700;
      color: #c8a96b;
      padding: 8px 0;
    }

    .day {
      padding: 12px 0;
      background: #2a2a2a;
      border-radius: 6px;
    }

    .today {
      background: #c8a96b;
      color: #111;
      font-weight: 700;
    }

    .empty {
      background: transparent;
    }
  </style>
</head>
<body>

  <div class="calendar-box">
    <div class="calendar-header">
      <button id="prevBtn" title="Previous Month">&#8592;</button>
      <h2 id="monthYear"></h2>
      <button id="nextBtn" title="Next Month">&#8594;</button>
    </div>

    <div class="calendar-grid" id="calendarGrid">
      <div class="day-name">Sun</div>
      <div class="day-name">Mon</div>
      <div class="day-name">Tue</div>
      <div class="day-name">Wed</div>
      <div class="day-name">Thu</div>
      <div class="day-name">Fri</div>
      <div class="day-name">Sat</div>
    </div>
  </div>

  <script>
    const monthYear = document.getElementById('monthYear');
    const calendarGrid = document.getElementById('calendarGrid');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    const today = new Date();
    let currentMonth = today.getMonth();
    let currentYear = today.getFullYear();

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    function renderCalendar(month, year) {
      const existingDays = document.querySelectorAll('.day, .empty');
      existingDays.forEach(day => day.remove());

      monthYear.textContent = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'empty';
        calendarGrid.appendChild(emptyCell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dayCell = document.createElement('div');
        dayCell.className = 'day';

        if (
          day === today.getDate() &&
          month === today.getMonth() &&
          year === today.getFullYear()
        ) {
          dayCell.classList.add('today');
        }

        dayCell.textContent = day;
        calendarGrid.appendChild(dayCell);
      }
    }

    prevBtn.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar(currentMonth, currentYear);
    });

    nextBtn.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar(currentMonth, currentYear);
    });

    renderCalendar(currentMonth, currentYear);
  </script>

</body>
</html>
