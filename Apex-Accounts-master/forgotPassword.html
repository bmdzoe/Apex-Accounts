<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120" title="Apex Accounts logo">
</header>

<main>
  <h1>Forgot Password</h1>
  <p>Please enter the email address and user id provided when your credentials were created in the system.</p>

  <form id="forgotPasswordForm">
    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" required title="Enter the email address associated with your account"><br><br>

    <label for="userid">User ID</label><br>
    <input type="text" id="userid" name="userid" required title="Enter the user ID assigned to your account"><br><br>

    <button type="submit" title="Continue to the security questions page">Next</button>
    <a href="login.html" title="Cancel password recovery and return to the login page">Cancel</a>
  </form>
</main>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const reset = document.getElementById("forgotPasswordForm");

  reset.addEventListener('submit', async(e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const id = document.getElementById("userid").value.trim();

    try {
      const userSnap = await getDoc(doc(db, "users", id));

      // confirm that user information entered correctly
      if (userSnap.exists()) {
        const userData = userSnap.data();

        if (userData.email === email) {
          // data persistence to next page
          sessionStorage.setItem("resetEmail", email);
          sessionStorage.setItem("resetId", id);
          window.location.href = "securityQuestions.html";
        } else {
          alert("This email does not match the ID given.");
        }
      } else {
        alert("This user ID does not exist. try a different email/ID?");
      }
    } catch (error) {
      alert("An error occurred: " + error);
    }
  });
</script>

</body>
</html>
