<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Send Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo">
  <div>
    <span>Username: AdminUser</span>
    <a href="profile.html">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
	<a href="login.html">Logout</a>
  </div>
</header>

<main>
  <h1>Send Email</h1>

  <form action="#" method="get">

    <label for="email">To:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="fromEmail">From:</label><br>
    <input type="email" id="fromEmail" value="apexhelper12@gmail.com (Apex-Accounts Admin)" disabled><br><br>

    <label for="subject">Subject</label><br>
    <input type="text" id="subject" name="subject" required><br><br>

    <label for="message">Message</label><br>
    <textarea id="message" name="message" rows="8" required></textarea><br><br>

    <button type="submit">Send</button>
    <a href="adminDashboard.html">Cancel</a>
  </form>
</main>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
   (function(){
      emailjs.init("cC6e6ZNLke2V3BRfU"); 
   })();

   const sendEmail = (emailData) => {
    emailjs.send("service_nnjzk4j", "template_r50wjct", { //service id then template id
        recipientEmail: emailData.recipient,
        subject: emailData.subject,
        message: emailData.message
    }).then(() => {
        alert("Email sent successfully!");
    }, (error) => {
        alert("Failed to send email: " + JSON.stringify(error));
    });
};
</script>

<script type="text/javascript">
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
  
    //getting form values to send
    const recipientEmail = document.getElementById('email').value;
    const emailSubject = document.getElementById('subject').value;
    const emailMessage = document.getElementById('message').value;

    sendEmail({
        recipient: recipientEmail,
        subject: emailSubject,
        message: emailMessage
    });
  });
</script>

</body>

</html>
