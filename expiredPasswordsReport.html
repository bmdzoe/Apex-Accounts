<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expired Passwords Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <img src="assets/logo.png" alt="Logo">
  <div>
    <span id="headerUsername">Username: AdminUser</span>
    <a href="profile.html">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
    <a href="login.html" onclick="localStorage.clear()">Logout</a>
  </div>
</header>
<main>
  <h1>Expired Passwords Report</h1>
  <p id="loadingMsg">Loading report...</p>
  <p id="emptyMsg" style="display:none;">No expired passwords found.</p>
  <table border="1" cellpadding="8" cellspacing="0" id="reportTable" style="display:none;">
    <thead>
      <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Expiration Date</th>
      </tr>
    </thead>
    <tbody id="reportBody"></tbody>
  </table>
  <br>
  <a href="adminDashboard.html">Back</a>
</main>
</body>
<script type="module">
  import { db } from './firebase-config.js';
  import { collection, query, where, Timestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const username = localStorage.getItem('username');
  if (username) document.getElementById('headerUsername').textContent = 'Username: ' + username;
  async function loadExpiredPasswords() {
    const tbody = document.getElementById('reportBody');
    try {
      const now = Timestamp.now();
      const q   = query(
        collection(db, "users"),
        where("passwordExpiry", "<=", now)
      );
      const snapshot = await getDocs(q);
      document.getElementById('loadingMsg').style.display = 'none';
      if (snapshot.empty) {
        document.getElementById('emptyMsg').style.display = 'block';
        return;
      }
      snapshot.forEach((docSnap) => {
        const u      = docSnap.data();
        const expiry = u.passwordExpiry
          ? u.passwordExpiry.toDate().toLocaleDateString()
          : 'N/A';
        const row = `
          <tr>
            <td>${docSnap.id.substring(0, 8)}...</td>
            <td>${u.username || 'N/A'}</td>
            <td>${u.email}</td>
            <td>${expiry}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
      document.getElementById('reportTable').style.display = 'table';
    } catch (err) {
      document.getElementById('loadingMsg').textContent = 'Failed to load report.';
    }
  }
  loadExpiredPasswords();
</script>
</html>
