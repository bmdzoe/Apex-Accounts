<!-- accessRequests.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pending Approvals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">
  <div>
    <span>Username: AdminUser</span>
    <a href="profile.html">
      <img src="assets/userAdmin.png" alt="User Profile" width="40" height="40">
    </a>
	<a href="login.html">Logout</a>
  </div>
</header>


<main>
  <h1>Pending Approvals</h1>

  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Request ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>DOB</th>
        <th>Address</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>R-001</td>
        <td>Jane Doe</td>
        <td>jane@example.com</td>
        <td>2000-01-01</td>
        <td>123 Main St</td>
        <td><a href="approveReject.html">Review</a></td>
      </tr>
    </tbody>
  </table>

  <br>
  <a href="adminDashboard.html">Back</a>
</main>

</body>

<script type="module">
  import { db } from './firebase-config.js';
  import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  async function loadPendingUsers() {
    const tbody = document.querySelector('tbody');
    tbody.innerHTML = ""; 

    // showing users with false attribute
    const q = query(
    collection(db, "users"), 
    where("approved", "==", false), 
    where("status", "==", "pending"));

    const querySnapshot = await getDocs(q);

    querySnapshot.forEach((doc) => {
      const user = doc.data();
      
      // row for each unapproved user
      const row = `
        <tr>
          <td>${doc.id.substring(0, 5)}...</td>
          <td>${user.firstName} ${user.lastName}</td>
          <td>${user.email}</td>
          <td>${user.dob}</td>
          <td>${user.address}</td>
          <td><a href="approveReject.html?uid=${doc.id}">Review</a></td>
        </tr>
      `;
      tbody.innerHTML += row;
    });
  }

  loadPendingUsers();
</script>

</html>
