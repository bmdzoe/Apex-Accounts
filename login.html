<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Application</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="login-card">
    <div class="logo-area">
      <img src="assets/logo.png" alt="Logo">
      <div class="logo-name">Apex Account</div>
    </div>

    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Please login to your account</p>
    </div>

    <div class="form-group">
      <label for="loginUser">Username</label>
      <input id="loginUser" type="text" placeholder="Enter your username" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="loginPw">Password</label>
      <input id="loginPw" type="password" placeholder="Enter your password" autocomplete="current-password">
      <span class="input-icon" onclick="togglePw()">👁</span>
    </div>

    <div id="loginError" class="error-msg">Please enter your username and password.</div>

    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>

    <a class="btn btn-secondary" href="forgotPassword.html">Forgot Password</a>

    <div class="divider">or</div>

    <a class="btn btn-secondary" href="register.html">Create New User Account</a>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('loginPw');
      const icon = document.querySelector('.input-icon');
      if (inp.type === 'password') { inp.type = 'text'; icon.textContent = '🙈'; }
      else { inp.type = 'password'; icon.textContent = '👁'; }
    }

    function doLogin() {
      const u   = document.getElementById('loginUser').value;
      const p   = document.getElementById('loginPw').value;
      const err = document.getElementById('loginError');

      if (!u || !p) { err.style.display = 'block'; return; }
      err.style.display = 'none';

      alert('Login successful! In the real app this would redirect to accountantDashboard.html');
    }
  </script>

</body>
</html>
