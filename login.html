<!-- login.html (redone to match your layout) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">
</header>

<main>
  <h1>Login</h1>

  <form action="#" method="post">
    <label for="username">Username</label><br>
    <input id="username" name="username" type="text" autocomplete="username" required><br><br>

    <label for="password">Password</label><br>
    <input id="password" name="password" type="password" autocomplete="current-password" required><br><br>

    <div class="login-actions">
      <button type="submit">Submit</button>
      <a href="forgotPassword.html">Forgot Password</a>
    </div>

    <a href="register.html">Create New User</a>
  </form>
</main>

</body>
</html>
