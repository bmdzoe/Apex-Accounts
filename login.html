<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="assets/logo.png" alt="Logo" width="120">
</header>

<main>
  <h1>Login</h1>

 
 <form id="loginForm"> <!-- Form id -->
  <label for="email">Email</label><br>
  <input id="email" type="email" required><br><br>

  <label for="password">Password</label><br>
  <input id="password" type="password" required><br><br>

  <button type="submit">Submit</button>
</form>
    <a href="forgotPassword.html">Forgot Password</a><br><br>

    <a href="register.html">Create New User</a>
  </form>
</main>

<script type="module">
  import { auth } from './firebase-config.js';
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
       
        window.location.href = "accountantDashboard.html"; 
      })
      .catch((error) => {
        alert("Login failed: " + error.message);
      });
  });
</script>

</body>
</html>
