<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Apex Accounts - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="login-card">
    <div class="logo-area">
      <img src="assets/logo.png" alt="Logo">
      <div class="logo-name">Apex Account</div>
    </div>

    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Please login to your account</p>
    </div>

 
 <form id="loginForm"> <!-- Form id -->

 <div class="form-group">
      <label for="loginUser">Email</label>
      <input id="loginUser" type="text" placeholder="Enter your email" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="loginPw">Password</label>
      <input id="loginPw" type="password" placeholder="Enter your password" autocomplete="current-password">


<div id="loginError" class="error-msg" style="display:none; color: red; margin-bottom: 10px;"></div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">Sign In</button>
    </form>
    <a class="btn btn-secondary" href="forgotPassword.html" style="display: block; text-align: center; margin-bottom: 10px;">Forgot Password</a>

    <div class="divider" style="text-align: center; margin: 15px 0;">or</div>

    <a class="btn btn-secondary" href="register.html" style="display: block; text-align: center;">Create New User Account</a>
  </div>



<script type="module">
  import { auth, db } from './firebase-config.js';
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('loginUser').value;
    const password = document.getElementById('loginPw').value;

    signInWithEmailAndPassword(auth, email, password).then(async(userCredential) => {
    
      const user = userCredential.user;
      const userSnap = await getDoc(doc(db, "users", user.uid));

      if (userSnap.exists()) {
        const userData = userSnap.data();
  
        if(userData.status === "suspended") {
          await signout(auth).then(() => {
            alert("Your account has been suspended from too many failed attempts. Please contact administration for details.");
          }).catch((error) => {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = "Login failed: " + error.message;
            errorDiv.style.display = 'block';            
          });          
          return;
        }

        if (userData.status === 'rejected') {
          alert("Your account request has been rejected. Please contact administration for details.");
          return; //rejected gets rejection alert
        }

        if(userData.loginAttempts > 0){
          await updateDoc(doc(db, "users", user.uid), {loginAttempts: 0});
        }
  
        // no admin approval gets pending page
        if (userData.approved === false) {
          window.location.href = "pendingApproval.html";
        } else {
          // approval goes to dashboard
          window.location.href = "accountantDashboard.html";
        }
      }
    })
    .catch(async(error) => {
      const errorDiv = document.getElementById('loginError');
      errorDiv.style.display = 'block';

      // If password entry was invalid, increment account log-in attempts
      if(error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
        const q = query(collection(db, "users"), where ("email", "==", email)); // Get user data by email
        const querySnap = await getDocs(q);

        if(!querySnap.empty) {
          const userDoc = querySnap.docs[0];
          const userData = userDoc.data();
          const userDocRef = doc(db, "users", userDoc.id);

          let logins = userData.loginAttempts + 1;
          let updates = {loginAttempts: logins};
          let suspended = false;

          if(logins >= 3) { // Suspend account once 3 unsuccessful log-in attempts are exceeded
            updates.status = "suspended";
            suspended = true;
          }

          await updateDoc(userDocRef, updates);
          if(suspended) { // Redirect the user to the suspension page
            window.location.href = "suspend.html";
          } else {
            errorDiv.textContent = "Incorrect password or email entered, please try again. Attempts remaining: " + (3 - logins);
          }
        }
      } else{
        errorDiv.textContent = "Login failed: " + error.message;
      }
    });
  });
</script>

</body>
</html>
