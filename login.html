<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apex Accounts - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="login-card">
    <div class="logo-area">
      <img src="assets/logo.png" alt="Logo" title="Apex Accounts logo">
      <div class="logo-name">Apex Account</div>
    </div>

    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Please login to your account</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginUser">Email</label>
        <input id="loginUser" type="text" placeholder="Enter your email" autocomplete="username" title="Enter the email address associated with your account">
      </div>

      <div class="form-group">
        <label for="loginPw">Password</label>
        <input id="loginPw" type="password" placeholder="Enter your password" autocomplete="current-password" title="Enter your account password">
      </div>

      <div id="loginError" class="error-msg" style="display:none; color: red; margin-bottom: 10px;"></div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" title="Sign in to Apex Accounts">Sign In</button>
    </form>

    <a class="btn btn-secondary" href="forgotPassword.html" style="display: block; text-align: center; margin-bottom: 10px;" title="Recover access to your account if you forgot your password">Forgot Password</a>

    <div class="divider" style="text-align: center; margin: 15px 0;">or</div>

    <a class="btn btn-secondary" href="register.html" style="display: block; text-align: center;" title="Create a new user account request">Create New User Account</a>
  </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { collection, query, where, doc, getDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const loginForm = document.getElementById('loginForm');
  const errorDiv  = document.getElementById('loginError');
  let errorMap = null;

  // Initialize error map
  (async () => {
    errorMap = await pullErrors();
  })();

  function showError(msg) {
    errorDiv.textContent   = msg;
    errorDiv.style.display = 'block';
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';

    const email    = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPw').value;

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user     = userCredential.user;
      const userRef  = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        showError( getError(errorMap, '19', 'type') + " User record not found.");
        return;
      }

      const userData = userSnap.data();

      // Reset failed attempts on successful login
      if (userData.loginAttempts > 0) {
        await updateDoc(userRef, { loginAttempts: 0 });
      }

      // Check if suspended — auto-lift if end date has passed
      if (userData.status === 'suspended') {
        const suspendedUntil = userData.suspendedUntil;
        const today          = new Date().toISOString().split('T')[0];

        if (suspendedUntil && today > suspendedUntil) {
          // Suspension expired — automatically reactivate
          await updateDoc(userRef, {
            status:           'approved',
            loginAttempts:    0,
            suspendedFrom:    null,
            suspendedUntil:   null,
            suspensionReason: null
          });
          // Fall through and continue login normally
        } else {
          // Still suspended
          await signOut(auth);
          window.location.href = "suspend.html";
          return;
        }
      }

      // Check other statuses
      if (userData.status === 'rejected') {
        await signOut(auth);
        alert("Your account request has been rejected. Please contact administration.");
        return;
      }
      if (userData.approved === false) {
        window.location.href = "pendingApproval.html";
        return;
      }

      // Store session info
      localStorage.setItem('role',     userData.role);
      localStorage.setItem('username', userData.username);
      localStorage.setItem('userId',   user.uid);

      // Route based on role
      if (userData.role === 'administrator') {
        window.location.replace("adminDashboard.html");
      } else if (userData.role === 'manager') {
        window.location.replace("managerDashboard.html");
      } else {
        window.location.replace("accountantDashboard.html");
      }

    } catch (error) {
      // Track failed attempts and suspend after 3
      if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
        try {
          const q         = query(collection(db, "users"), where("email", "==", document.getElementById('loginUser').value.trim()));
          const querySnap = await getDocs(q);

          if (!querySnap.empty) {
            const userDoc    = querySnap.docs[0];
            const userData   = userDoc.data();
            const userDocRef = doc(db, "users", userDoc.id);
            const logins     = (userData.loginAttempts || 0) + 1;

            if (logins >= 3) {
              await updateDoc(userDocRef, {
                loginAttempts:    logins,
                status:           "suspended",
                suspendedFrom:    new Date().toISOString().split('T')[0],
                suspendedUntil:   null,
                suspensionReason: "Too many failed login attempts"
              });
              window.location.href = "suspend.html";
              return;
            } else {
              await updateDoc(userDocRef, { loginAttempts: logins });
              showError(getError(errorMap, '20', 'type') + ` Incorrect password or email. Attempts remaining: ${3 - logins}`);
              return;
            }
          } else {
            showError(getError(errorMap, '21', 'type') + " Login failed: Invalid email/password.");
          }
        } catch (err) {
          showError(getError(errorMap, '22', 'type') + " Login failed with error: " + err.message);
        }
      } else {
        showError(getError(errorMap, '23', 'type') + " Login failed: " + error.message);
      }
    }
  });

  async function pullErrors() { // Grab all error documents from Firestore
    try {
      const snap = await getDocs(query(collection(db, 'errors')));
      return new Map(snap.docs.map(doc => [doc.id, doc.data()]));
    } catch (e) {
      console.error('Failed to load errors:', e.message);
      return new Map();
    }
  }

  function getError(map, id, field) { // Retrieve field data from specified error id
    if(!map) return '[Error map not available]';
    const error = map.get(id);
    if (!error) return '[Trouble retrieving document]';
    return error[field] || '[Field not found]';
  }
</script>
</body>
</html>
