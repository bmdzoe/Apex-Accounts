<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Apex Accounts - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="login-card">
    <div class="logo-area">
      <img src="assets/logo.png" alt="Logo">
      <div class="logo-name">Apex Account</div>
    </div>

    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Please login to your account</p>
    </div>

 
 <form id="loginForm"> <!-- Form id -->

 <div class="form-group">
      <label for="loginUser">Email</label>
      <input id="loginUser" type="text" placeholder="Enter your email" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="loginPw">Password</label>
      <input id="loginPw" type="password" placeholder="Enter your password" autocomplete="current-password">


<div id="loginError" class="error-msg" style="display:none; color: red; margin-bottom: 10px;"></div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">Sign In</button>
    </form>
    <a class="btn btn-secondary" href="forgotPassword.html" style="display: block; text-align: center; margin-bottom: 10px;">Forgot Password</a>

    <div class="divider" style="text-align: center; margin: 15px 0;">or</div>

    <a class="btn btn-secondary" href="register.html" style="display: block; text-align: center;">Create New User Account</a>
  </div>



<script type="module">
  import { auth, db } from './firebase-config.js';
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('loginUser').value;
    const password = document.getElementById('loginPw').value;

    signInWithEmailAndPassword(auth, email, password)
      .then(async(userCredential) => {

    const user = userCredential.user;
    const userSnap = await getDoc(doc(db, "users", user.uid));

    if (!userSnap.exists()) {
      window.location.href = "login.html";
      return;
    }

      const userData = userSnap.data();

    if (userData.status === 'rejected') {
    alert("Your account request has been rejected. Please contact administration for details.");
    return; //rejected gets rejection alert
  }

      // no admin approval gets pending page
      if (userData.approved === false) {
        window.location.href = "pendingApproval.html";
        return;
      }

        // role based redirected
        const role = (userData.role || "").toLowerCase();

        if (role ==="admin") {
          window.location.href = "adminDashboard.html";
        } else if (role === "manager") {
          window.location.href = "managerDashboard.html";
        } else {
          window.location.href = "accountantDashboard.html";
        }
      })
      .catch((error) => {
        const errorDiv = document.getElementById('loginError');
      errorDiv.textContent = "Login failed: " + error.message;
        errorDiv.style.display = 'block';
      });

</script>

</body>
</html>
