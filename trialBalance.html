<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trial Balance – Apex Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    function openCalendar() {
      window.open("calendar.html", "CalendarPopup", "width=500,height=550,left=100,top=100,resizable=yes,scrollbars=no");
    }
    function openHelp() {
      window.open("help.html", "HelpPopup", "width=700,height=600,left=120,top=80,resizable=yes,scrollbars=yes");
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>(function () { emailjs.init("cC6e6ZNLke2V3BRfU"); })();</script>
</head>

<body>
  <header class="header-bar">
    <img src="assets/logo.png" alt="Apex Accounts Logo" width="120">
    <div class="top-services">
      <span onclick="openCalendar()" title="Open the calendar popup">Calendar</span>
      <span onclick="window.location.href='chartOfAccounts.html'" title="Open the Chart of Accounts module">Chart of Accounts</span>
      <span onclick="window.location.href='journaling.html'" title="Open the Journaling module">Journaling</span>
      <span onclick="openHelp()" title="Open help information for the software">Help</span>
    </div>
    <div class="user-area">
      <span id="headerUsername">Username: </span>
      <a href="profile.html" title="Open your user profile">
        <img id="userAvatar" src="assets/userManager.png" alt="User Profile" width="40" height="40">
      </a>
      <a href="login.html" onclick="localStorage.clear()" title="Log out of the system">Logout</a>
    </div>
  </header>

  <main class="main-content">
    <h1>Trial Balance</h1>

    <!-- Date range picker -->
    <fieldset>
      <legend>Report Period</legend>
      <label for="dateFrom">From Date *</label><br>
      <input type="date" id="dateFrom" required
        title="Select the start date for the trial balance reporting period"><br><br>
      <label for="dateTo">To Date *</label><br>
      <input type="date" id="dateTo" required
        title="Select the end date for the trial balance reporting period"><br><br>
      <p id="dateError" style="color:red; display:none;"></p>
      <button onclick="generateReport()"
        title="Generate the trial balance for the selected date range">
        Generate Report
      </button>
    </fieldset>
  
    <br>
    <p id="loadingMsg" style="display:none;">Generating report…</p>
    <p id="reportError" style="color:red; display:none;"></p>
    <div id="reportOutput" style="display:none;">
      <h2>Apex Accounts</h2>
      <h3>Trial Balance</h3>
      <p id="reportPeriodLabel"></p>
      <p id="reportGeneratedLabel" style="font-size:12px;"></p>

      <br>
      <table border="1" cellpadding="8" cellspacing="0" style="width:100%; max-width:850px;"
        title="Trial balance showing all accounts with debit and credit balances">
        <thead>
          <tr>
            <th title="Account number and name">Account</th>
            <th style="text-align:right;" title="Debit balance">Debit</th>
            <th style="text-align:right;" title="Credit balance">Credit</th>
          </tr>
        </thead>
        <tbody id="accountsBody">
          <!-- Report data will be inserted here -->
        </tbody>
        <tfoot>
          <tr style="font-weight:bold; border-top:3px solid #333;">
            <td>Totals</td>
            <td style="text-align:right;"><strong id="totalDebit">$0.00</strong></td>
            <td style="text-align:right;"><strong id="totalCredit">$0.00</strong></td>
          </tr>
        </tfoot>
      </table>
      <p id="balanceCheck" style="margin-top:12px; font-weight:bold;"></p>
      <br>
      <!-- Action buttons -->
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="window.print()"
          title="Print the trial balance using your browser's print dialog">
          Print
        </button>
        <button onclick="saveCSV()"
          title="Save the trial balance as a CSV file to your computer">
          Save (CSV)
        </button>
        <button onclick="openEmailDialog()"
          title="Email the trial balance to a recipient">
          Email Report
        </button>
      </div>
    </div>

    <br>
    <a href="#" id="backLink" title="Return to your dashboard">← Back to Dashboard</a>
  </main>

  <!-- Email dialog -->
  <dialog id="emailDialog">
    <h3>Email Trial Balance</h3>
    <label for="emailTo">Recipient Email *</label><br>
    <input type="email" id="emailTo" placeholder="recipient@example.com"
      title="Enter the recipient's email address"><br><br>
    <label for="emailSubject">Subject</label><br>
    <input type="text" id="emailSubject"
      title="Enter the email subject line"><br><br>
    <label for="emailMessage">Message</label><br>
    <textarea id="emailMessage" rows="5" cols="50"
      title="Enter an optional message to include with the report"></textarea><br><br>
    <p id="emailError"   style="color:red;   display:none;"></p>
    <p id="emailSuccess" style="color:green; display:none;"></p>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
      <button onclick="document.getElementById('emailDialog').close()"
        title="Cancel and close the email dialog">Cancel</button>
      <button id="sendEmailBtn" onclick="sendEmail()"
        title="Send the trial balance report via email">Send</button>
    </div>
  </dialog>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      collection, getDocs, doc, getDoc, addDoc, query, where, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentUser = null;
    let reportData = null;

    const fmtMoney = v => new Intl.NumberFormat('en-US', {
      style: 'currency', currency: 'USD',
      minimumFractionDigits: 2, maximumFractionDigits: 2
    }).format(v);

    const fmtDate = iso => new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    // Auth guard
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { window.location.href = 'login.html'; return; }
      const ud = snap.data();
      document.getElementById('headerUsername').textContent = 'Username: ' + (ud.username || '');
      const av = document.getElementById('userAvatar');
      if (ud.role === 'administrator')   av.src = 'assets/userAdmin.png';
      else if (ud.role === 'accountant') av.src = 'assets/userAccountant.png';
      const backLink = document.getElementById('backLink');
      if (ud.role === 'administrator')   backLink.href = 'adminDashboard.html';
      else if (ud.role === 'manager')    backLink.href = 'managerDashboard.html';
      else                               backLink.href = 'accountantDashboard.html';
      // Default to current month
      const now   = new Date();
      const year  = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      document.getElementById('dateFrom').value = `${year}-${month}-01`;
      document.getElementById('dateTo').value   = now.toISOString().split('T')[0];
      document.getElementById('emailSubject').value = 'Trial Balance – Apex Accounts';
    });

    // Generate report
    window.generateReport = async function () {
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo   = document.getElementById('dateTo').value;
      const dateErr  = document.getElementById('dateError');
      dateErr.style.display = 'none';
      if (!dateFrom || !dateTo) {
        dateErr.textContent = 'Please select both a start and end date.';
        dateErr.style.display = 'block'; return;
      }
      if (dateTo < dateFrom) {
        dateErr.textContent = 'End date must be on or after the start date.';
        dateErr.style.display = 'block'; return;
      }
      document.getElementById('loadingMsg').style.display   = 'block';
      document.getElementById('reportOutput').style.display = 'none';
      document.getElementById('reportError').style.display  = 'none';
      try {
        // Load all accounts
        const acctSnap = await getDocs(collection(db, 'accounts'));
        const accounts = {};
        acctSnap.docs.forEach(d => {
          const a = d.data();
          accounts[d.id] = { ...a, id: d.id, debit: 0, credit: 0 };
        });
        // Load approved journal entries in date range
        const entriesSnap = await getDocs(
          query(collection(db, 'journalEntries'),
            where('status', '==', 'approved'),
            where('date', '>=', dateFrom),
            where('date', '<=', dateTo))
        );
        // Tally debits and credits per account
        entriesSnap.docs.forEach(d => {
          (d.data().lines || []).forEach(line => {
            if (accounts[line.accountId]) {
              const amt = Number(line.amount || 0);
              if (line.type === 'debit')  accounts[line.accountId].debit  += amt;
              if (line.type === 'credit') accounts[line.accountId].credit += amt;
            }
          });
        });
       // calculates net balance and place correct column
        const accountList = Object.values(accounts)
          .map(a => {
            const initial = Number(a.initialBalance || 0);
            const isDebitNormal = ['Asset', 'Expense'].includes(a.accountCategory);
            const netBalance = isDebitNormal
              ? initial + a.debit - a.credit
              : initial + a.credit - a.debit;
            return {
              ...a,
              
              debit: isDebitNormal ? parseFloat(Math.abs(netBalance).toFixed(2)) : 0,
              credit: !isDebitNormal ? parseFloat(Math.abs(netBalance).toFixed(2)) : 0
            };
          })
          .filter(a => a.debit > 0 || a.credit > 0)
          .sort((a, b) => {
            const catSort = (a.accountCategory || '').localeCompare(b.accountCategory || '');
            return catSort !== 0 ? catSort : (a.accountNumber || '').localeCompare(b.accountNumber || '');
          });
        const totalDebit  = parseFloat(accountList.reduce((s, a) => s + a.debit, 0).toFixed(2));
        const totalCredit = parseFloat(accountList.reduce((s, a) => s + a.credit, 0).toFixed(2));
        const isBalanced  = Math.abs(totalDebit - totalCredit) < 0.01;
        reportData = { dateFrom, dateTo, accountList, totalDebit, totalCredit, isBalanced };
        // report header
        document.getElementById('reportPeriodLabel').textContent =
          `Period End: ${fmtDate(dateTo)}`;
        document.getElementById('reportGeneratedLabel').textContent =
          `Generated: ${new Date().toLocaleString()} · ${document.getElementById('headerUsername').textContent}`;
       
        const tbody = document.getElementById('accountsBody');
        tbody.innerHTML = '';
        if (!accountList.length) {
          tbody.innerHTML = '<tr><td colspan="3"><em>No accounts with activity for this period.</em></td></tr>';
        } else {
          accountList.forEach(a => {
            tbody.innerHTML += `
              <tr>
                <td>${a.accountNumber} — ${a.accountName}</td>
                <td style="text-align:right;">${fmtMoney(a.debit)}</td>
                <td style="text-align:right;">${fmtMoney(a.credit)}</td>
              </tr>`;
          });
        }
        document.getElementById('totalDebit').textContent  = fmtMoney(totalDebit);
        document.getElementById('totalCredit').textContent = fmtMoney(totalCredit);
        const balanceEl = document.getElementById('balanceCheck');
        if (isBalanced) {
          balanceEl.textContent = '✓ Trial Balance is in balance (Debits = Credits)';
          balanceEl.style.color = 'green';
        } else {
          const difference = parseFloat((totalDebit - totalCredit).toFixed(2));
          balanceEl.textContent = `✗ Trial Balance is OUT OF BALANCE by ${fmtMoney(Math.abs(difference))}`;
          balanceEl.style.color = 'red';
        }
        // Pre-fill email fields
        document.getElementById('emailSubject').value =
          `Trial Balance: ${fmtDate(dateTo)}`;
        document.getElementById('emailMessage').value =
          `Trial Balance as of ${fmtDate(dateTo)}\n\nTotal Debits:  ${fmtMoney(totalDebit)}\nTotal Credits: ${fmtMoney(totalCredit)}\n\n${isBalanced ? 'The trial balance is in balance.' : 'WARNING: The trial balance is out of balance!'}`;
        // Auto-save to Firestore
        await addDoc(collection(db, 'savedReports'), {
          reportType: 'Trial Balance',
          dateFrom, dateTo, totalDebit, totalCredit, isBalanced,
          generatedBy: currentUser.uid,
          generatedAt: serverTimestamp(),
        });
        document.getElementById('loadingMsg').style.display   = 'none';
        document.getElementById('reportOutput').style.display = 'block';
      } catch (err) {
        document.getElementById('loadingMsg').style.display = 'none';
        const el = document.getElementById('reportError');
        el.textContent = 'Failed to generate report: ' + err.message;
        el.style.display = 'block';
      }
    };

    // Save as CSV
    window.saveCSV = function () {
      if (!reportData) return;
      const raw = v => Number(v).toFixed(2);
      const rows = [
        ['Apex Accounts — Trial Balance'],
        [`As of: ${reportData.dateTo}`],
        [`Generated: ${new Date().toLocaleString()}`],
        [],
        ['Account Number', 'Account Name', 'Debit', 'Credit'],
      ];
      reportData.accountList.forEach(a =>
        rows.push([a.accountNumber || '', a.accountName || '', raw(a.debit), raw(a.credit)]));
      rows.push(['', 'Totals', raw(reportData.totalDebit), raw(reportData.totalCredit)]);
      rows.push([], [reportData.isBalanced ? 'IN BALANCE' : 'OUT OF BALANCE']);
      const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href     = URL.createObjectURL(blob);
      link.download = `trial-balance-${reportData.dateTo}.csv`;
      link.click();
    };

    // Open email dialog
    window.openEmailDialog = function () {
      document.getElementById('emailError').style.display   = 'none';
      document.getElementById('emailSuccess').style.display = 'none';
      document.getElementById('emailDialog').showModal();
    };

    // Send email
    window.sendEmail = function () {
      const to    = document.getElementById('emailTo').value.trim();
      const errEl = document.getElementById('emailError');
      const sucEl = document.getElementById('emailSuccess');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';
      if (!to || !to.includes('@')) {
        errEl.textContent = 'Please enter a valid recipient email address.';
        errEl.style.display = 'block'; return;
      }
      const btn = document.getElementById('sendEmailBtn');
      btn.disabled = true; btn.textContent = 'Sending…';
      emailjs.send('service_nnjzk4j', 'template_r50wjct', {
        recipientEmail: to,
        subject:        document.getElementById('emailSubject').value.trim(),
        message:        document.getElementById('emailMessage').value.trim(),
        name:           localStorage.getItem('username') || 'Apex Accounts',
        time:           new Date().toLocaleString(),
      }).then(
        () => {
          sucEl.textContent = 'Email sent successfully!';
          sucEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Send';
          setTimeout(() => { document.getElementById('emailDialog').close(); }, 2000);
        },
        (err) => {
          errEl.textContent = 'Failed to send email: ' + (err.text || err.message);
          errEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Send';
        }
      );
    };
  </script>
</body>
</html>
